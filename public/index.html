<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camcum Meet - Rock Solid Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { zinc: { 950: '#09090b' } }
                }
            }
        }
    </script>
    <!-- Agora Web SDK & Lucide Icons -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .glass {
            background: rgba(24, 24, 27, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 min-h-screen flex flex-col justify-between font-sans antialiased transition-colors duration-200">

    <!-- Header -->
    <header class="p-4 border-b border-zinc-200 dark:border-zinc-900 bg-white/80 dark:bg-zinc-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="video" class="w-5 h-5 text-indigo-500 animate-pulse"></i>
                <span class="text-base font-bold tracking-tight bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">Camcum Meet</span>
            </div>
            <div id="room-status-bar" class="hidden flex items-center gap-2 text-xs bg-zinc-100 dark:bg-zinc-900 px-3 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 font-mono">
                <span>Room Channel: <b id="display-room-id" class="text-indigo-400 select-all">---</b></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto p-4 flex flex-col justify-center items-center">
        
        <!-- PANEL LOBBY -->
        <div id="panel-lobby" class="max-w-md w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-xl flex flex-col gap-5">
            <div class="text-center">
                <h2 class="text-xl font-bold tracking-tight">Masuk Rapat Video</h2>
                <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-1">Bekerja 100% di semua jaringan seluler & Wi-Fi.</p>
            </div>

            <!-- Input Room Channel -->
            <div>
                <label class="text-[11px] text-zinc-400 block mb-1 font-semibold uppercase tracking-wider">Nama / Kode Room (Bebas)</label>
                <input type="text" id="input-room" placeholder="Contoh: rapat-it atau 12345" class="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-zinc-800 dark:text-zinc-200 font-mono text-center tracking-wide">
            </div>

            <button id="btn-join" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/10">
                <i data-lucide="video" class="w-4 h-4"></i> Gabung / Buat Room
            </button>
            
            <p class="text-[10px] text-zinc-400 text-center">Siapa saja yang mengetikkan nama room yang sama akan otomatis masuk ke room yang sama.</p>
        </div>

        <!-- PANEL CONFERENCE -->
        <div id="panel-conference" class="w-full hidden flex flex-col gap-4 h-full">
            <div id="video-conference-grid" class="grid grid-cols-1 gap-4 w-full auto-rows-fr flex-1 min-h-[65vh]">
                <!-- Video Agora Container akan masuk ke sini -->
            </div>
        </div>

    </main>

    <!-- CONTROLS BAR -->
    <div id="conference-controls" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 glass border border-zinc-200 dark:border-zinc-800 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-4 z-50">
        <button id="btn-toggle-mic" class="p-3 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 rounded-xl transition text-zinc-800 dark:text-zinc-200">
            <i id="icon-mic" data-lucide="mic" class="w-5 h-5"></i>
        </button>
        <button id="btn-toggle-cam" class="p-3 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 rounded-xl transition text-zinc-800 dark:text-zinc-200">
            <i id="icon-cam" data-lucide="video" class="w-5 h-5"></i>
        </button>
        <div class="h-6 w-px bg-zinc-300 dark:bg-zinc-800"></div>
        <button id="btn-leave-room" class="p-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition shadow-lg shadow-red-600/20">
            <i data-lucide="phone-off" class="w-5 h-5"></i>
        </button>
    </div>

    <footer class="p-4 text-center text-[10px] text-zinc-400 dark:text-zinc-600 shrink-0">
        Camcum Meet Powered by Agora &copy; 2026
    </footer>

    <script>
        // --- ⚠️ AGORA CREDENTIALS (Wajib Diisi dari console.agora.io) ⚠️ ---
        // Jika akun Agora Anda menggunakan mode "Testing / No Token", biarkan AGORA_TOKEN berisi null atau "".
        const AGORA_APP_ID = "GANTI_DENGAN_APP_ID_AGORA_ANDA"; 
        const AGORA_TOKEN = null; 

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };
        let remoteUsers = {};

        let isMicOn = true;
        let isCamOn = true;

        const panelLobby = document.getElementById('panel-lobby');
        const panelConference = document.getElementById('panel-conference');
        const controlsBar = document.getElementById('conference-controls');
        const roomStatusBar = document.getElementById('room-status-bar');
        const videoGrid = document.getElementById('video-conference-grid');

        document.getElementById('btn-join').addEventListener('click', async () => {
            const roomName = document.getElementById('input-room').value.trim().toLowerCase();
            if (!roomName) {
                alert("Masukkan nama atau kode room!");
                return;
            }

            if (AGORA_APP_ID === "GANTI_DENGAN_APP_ID_AGORA_ANDA") {
                alert("PENTING: Silakan masukkan AGORA_APP_ID Anda di dalam tag <script> baris ke-97 agar aplikasi ini bisa berjalan!");
                return;
            }

            await joinRoom(roomName);
        });

        async function joinRoom(roomName) {
            try {
                // 1. Setup event listener untuk user lain yang bergabung/meninggalkan room
                client.on("user-published", handleUserPublished);
                client.on("user-unpublished", handleUserUnpublished);

                // 2. Gabung ke channel Agora (UID di-generate otomatis oleh server jika diisi null)
                const uid = await client.join(AGORA_APP_ID, roomName, AGORA_TOKEN, null);

                // Ganti Tampilan UI
                panelLobby.classList.add('hidden');
                panelConference.classList.remove('hidden');
                controlsBar.classList.remove('hidden');
                controlsBar.classList.add('flex');
                roomStatusBar.classList.remove('hidden');
                document.getElementById('display-room-id').innerText = roomName;

                // 3. Buat Track Kamera dan Mikrofon Lokal milik sendiri
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();

                // 4. Render Video Sendiri ke Layar
                createVideoContainer(uid, "Anda", true);
                localTracks.videoTrack.play(`video-${uid}`);

                // 5. Publish video & audio kita ke server agar dilihat peserta lain
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);

            } catch (error) {
                console.error("Gagal join room:", error);
                alert("Gagal masuk rapat. Pastikan App ID benar dan izin kamera disetujui.");
            }
        }

        // --- HANDLER SAAT USER LAIN JOIN DAN PUBLISH VIDEO ---
        async function handleUserPublished(user, mediaType) {
            const id = user.uid;
            remoteUsers[id] = user;
            
            // Subscribe ke data stream user tersebut dari server
            await client.subscribe(user, mediaType);

            if (mediaType === "video") {
                createVideoContainer(id, `Peserta ${id}`);
                user.videoTrack.play(`video-${id}`);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        }

        // --- HANDLER SAAT USER LAIN LEAVE ATAU OFF-CAM ---
        function handleUserUnpublished(user, mediaType) {
            if (mediaType === "video") {
                const id = user.uid;
                const box = document.getElementById(`box-${id}`);
                if (box) box.remove();
                delete remoteUsers[id];
                reorganizeGridTracks();
            }
        }

        // --- UI RENDER VIDEO GRID ---
        function createVideoContainer(uid, labelName, isLocal = false) {
            if (document.getElementById(`box-${uid}`)) return;

            const box = document.createElement('div');
            box.id = `box-${uid}`;
            box.className = "bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg relative aspect-video flex items-center justify-center";
            
            // Div internal khusus target render SDK Agora
            box.innerHTML = `
                <div id="video-${uid}" class="w-full h-full object-cover ${isLocal ? 'scale-x-[-1]' : ''}"></div>
                <div class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-xl text-xs font-medium border border-white/10 text-white flex items-center gap-1.5 z-10">
                    <span class="w-1.5 h-1.5 rounded-full ${isLocal ? 'bg-indigo-500' : 'bg-emerald-500'}"></span>
                    ${labelName}
                </div>
            `;

            videoGrid.appendChild(box);
            reorganizeGridTracks();
        }

        function reorganizeGridTracks() {
            const totalItems = videoGrid.children.length;
            if (totalItems <= 1) {
                videoGrid.className = "grid grid-cols-1 gap-4 w-full auto-rows-fr flex-1 min-h-[65vh]";
            } else if (totalItems === 2) {
                videoGrid.className = "grid grid-cols-1 md:grid-cols-2 gap-4 w-full auto-rows-fr flex-1 min-h-[65vh]";
            } else if (totalItems <= 4) {
                videoGrid.className = "grid grid-cols-2 gap-4 w-full auto-rows-fr flex-1 min-h-[65vh]";
            } else {
                videoGrid.className = "grid grid-cols-2 lg:grid-cols-3 gap-4 w-full auto-rows-fr flex-1 min-h-[65vh]";
            }
        }

        // --- CONTROLS ACTION HANDLERS ---
        document.getElementById('btn-toggle-mic').addEventListener('click', async () => {
            isMicOn = !isMicOn;
            await localTracks.audioTrack.setEnabled(isMicOn);
            updateButtonState('btn-toggle-mic', 'icon-mic', isMicOn, 'mic', 'mic-off');
        });

        document.getElementById('btn-toggle-cam').addEventListener('click', async () => {
            isCamOn = !isCamOn;
            await localTracks.videoTrack.setEnabled(isCamOn);
            updateButtonState('btn-toggle-cam', 'icon-cam', isCamOn, 'video', 'video-off');
        });

        function updateButtonState(btnId, iconId, isOn, onIcon, offIcon) {
            const btn = document.getElementById(btnId);
            const icon = document.getElementById(iconId);
            if (isOn) {
                btn.className = "p-3 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 rounded-xl transition text-zinc-800 dark:text-zinc-200";
                icon.setAttribute('data-lucide', onIcon);
            } else {
                btn.className = "p-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition";
                icon.setAttribute('data-lucide', offIcon);
            }
            lucide.createIcons();
        }

        document.getElementById('btn-leave-room').addEventListener('click', async () => {
            if (confirm("Keluar dari video call?")) {
                for (let trackName in localTracks) {
                    if (localTracks[trackName]) {
                        localTracks[trackName].stop();
                        localTracks[trackName].close();
                    }
                }
                await client.leave();
                window.location.reload();
            }
        });

        window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
